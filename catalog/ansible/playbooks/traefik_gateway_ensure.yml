---
- name: Ensure canonical managed Traefik gateway
  hosts: all
  gather_facts: false
  become: true
  vars:
    traefik_container_name: "traefik"
    traefik_image: "traefik:2.11"
    traefik_dynamic_dir: "/etc/traefik/dynamic/opsctl"
    traefik_acme_dir: "/var/lib/traefik"
    traefik_managed_labels:
      com.opsctl.managed: "true"
      com.opsctl.component: "traefik_gateway"
      com.opsctl.org_id: "{{ org_id }}"
    traefik_command_args:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic/opsctl"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
  pre_tasks:
    - name: Skip Traefik ensure when running in simulate mode
      meta: end_play
      when: simulate | default(false)

  tasks:
    - name: OPERATION_STEP traefik:start
      shell: |
        printf 'OPERATION_STEP={"name":"traefik:start","status":"running"}\n'
      args:
        executable: /bin/sh

    - name: Converge managed Traefik gateway
      block:
        - name: Validate required organization context
          assert:
            that:
              - org_id is defined
              - (org_id | string | length) > 0
            fail_msg: "org_id is required to manage the Traefik gateway"

        - name: Ensure Docker packages present
          apt:
            name:
              - docker.io
            state: present
            update_cache: true

        - name: Ensure Docker service running
          service:
            name: docker
            state: started
            enabled: true

        - name: Ensure Traefik dynamic config directory exists
          file:
            path: "{{ traefik_dynamic_dir }}"
            state: directory
            mode: "0755"

        - name: Ensure Traefik storage directory exists
          file:
            path: "{{ traefik_acme_dir }}"
            state: directory
            mode: "0755"

        - name: Ensure Traefik ACME file exists
          file:
            path: "{{ traefik_acme_dir }}/acme.json"
            state: touch
            mode: "0600"

        - name: Inspect existing Traefik container
          community.docker.docker_container_info:
            name: "{{ traefik_container_name }}"
          register: traefik_container_info

        - name: Extract existing Traefik container details
          set_fact:
            existing_traefik: >-
              {{
                (traefik_container_info.get('containers', []) | first)
                if ((traefik_container_info.get('containers', []) | length) > 0)
                else (traefik_container_info.get('container', None))
              }}

        - name: Derive existing Traefik management state
          set_fact:
            existing_traefik_labels: "{{ existing_traefik.Config.Labels | default({}) if existing_traefik else {} }}"
            managed_traefik_present: >-
              {{
                existing_traefik is not none
                and existing_traefik_labels.get('com.opsctl.managed') == 'true'
                and existing_traefik_labels.get('com.opsctl.component') == 'traefik_gateway'
              }}

        - name: Derive existing Traefik readiness state
          set_fact:
            existing_traefik_cmd: "{{ existing_traefik.Config.Cmd | default([]) if existing_traefik else [] }}"
            existing_traefik_mount_destinations: "{{ existing_traefik.Mounts | default([]) | map(attribute='Destination') | list if existing_traefik else [] }}"
            managed_traefik_ready: >-
              {{
                managed_traefik_present
                and existing_traefik is not none
                and existing_traefik.State.Status == 'running'
                and existing_traefik.HostConfig.NetworkMode == 'host'
                and existing_traefik_labels.get('com.opsctl.org_id') == (org_id | string)
                and '/var/run/docker.sock' in existing_traefik_mount_destinations
                and traefik_dynamic_dir in existing_traefik_mount_destinations
                and traefik_acme_dir in existing_traefik_mount_destinations
                and (
                  (traefik_command_args | difference(existing_traefik_cmd)) | length == 0
                )
              }}

        - name: Fail on unmanaged Traefik container conflict
          fail:
            msg: "Existing traefik container is not OpsCtl-managed; refusing to mutate unknown state"
          when:
            - existing_traefik is not none
            - not managed_traefik_present

        - name: Detect existing listeners on ports 80 and 443
          shell: |
            ss -H -ltn '( sport = :80 or sport = :443 )' || true
          args:
            executable: /bin/sh
          register: traefik_listener_check
          changed_when: false

        - name: Fail on unmanaged port listeners
          fail:
            msg: "Detected existing unmanaged listener on port 80 or 443; refusing to replace it"
          when:
            - not managed_traefik_present
            - (traefik_listener_check.stdout | trim | length) > 0

        - name: Ensure canonical managed Traefik container is running
          community.docker.docker_container:
            name: "{{ traefik_container_name }}"
            image: "{{ traefik_image }}"
            state: started
            recreate: true
            restart_policy: always
            detach: true
            network_mode: host
            volumes:
              - "/var/run/docker.sock:/var/run/docker.sock:ro"
              - "{{ traefik_dynamic_dir }}:/etc/traefik/dynamic/opsctl"
              - "{{ traefik_acme_dir }}:/var/lib/traefik"
            command: "{{ traefik_command_args }}"
            labels: "{{ traefik_managed_labels }}"
            pull: false
          when: not managed_traefik_ready

        - name: Re-inspect managed Traefik container
          community.docker.docker_container_info:
            name: "{{ traefik_container_name }}"
          register: traefik_container_ready

        - name: Extract converged Traefik container details
          set_fact:
            traefik_container_details: >-
              {{
                (traefik_container_ready.get('containers', []) | first)
                if ((traefik_container_ready.get('containers', []) | length) > 0)
                else (traefik_container_ready.get('container', None))
              }}

        - name: Verify canonical Traefik runtime
          assert:
            that:
              - traefik_container_details is not none
              - traefik_container_details.State.Status == "running"
              - traefik_container_details.HostConfig.NetworkMode == "host"
              - traefik_container_details.Config.Labels.get('com.opsctl.managed') == 'true'
              - traefik_container_details.Config.Labels.get('com.opsctl.component') == 'traefik_gateway'
              - traefik_container_details.Config.Labels.get('com.opsctl.org_id') == (org_id | string)
            fail_msg: "Traefik gateway did not converge to the canonical managed layout"

        - name: OPERATION_STEP traefik:ready
          shell: |
            printf 'OPERATION_STEP={"name":"traefik:ready","status":"completed"}\n'
          args:
            executable: /bin/sh

        - name: OPERATION_STEP traefik:complete
          shell: |
            printf 'OPERATION_STEP={"name":"traefik:complete","status":"completed"}\n'
          args:
            executable: /bin/sh
      rescue:
        - name: OPERATION_STEP traefik:failure
          shell: |
            printf 'OPERATION_STEP={"name":"traefik:failure","status":"failed"}\n'
          args:
            executable: /bin/sh

        - name: Fail Traefik gateway ensure
          fail:
            msg: "Traefik gateway ensure failed"
