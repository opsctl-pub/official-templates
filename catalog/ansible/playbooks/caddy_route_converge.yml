---
- name: Converge routed Caddy config for one deployment
  hosts: all
  gather_facts: false
  become: true
  vars:
    caddy_proxy_state_file: "/etc/opsctl/caddy-proxy.json"
    caddy_route_dir: "/etc/caddy/opsctl-routes"
    caddy_config_file: "/etc/caddy/Caddyfile"
    resolved_route_hosts: "{{ route_hosts | default(([route_host] if (route_host is defined and (route_host | string | length) > 0) else []), true) }}"
    caddy_route_config_file: "{{ caddy_route_dir }}/{{ app_slug }}.caddy"
    caddy_site_addresses: >-
      {% if route_https | default(true) | bool %}
      {{ resolved_route_hosts | join(', ') }}
      {% else %}
      {{ resolved_route_hosts | map('regex_replace', '^(.*)$', 'http://\\1') | join(', ') }}
      {% endif %}
  pre_tasks:
    - name: Skip Caddy route converge when running in simulate mode
      meta: end_play
      when: simulate | default(false)
  tasks:
    - name: OPERATION_STEP caddy-route:start
      shell: |
        printf 'OPERATION_STEP={"name":"caddy-route:start","status":"running","metadata":{"hosts":%s,"route_port":%s,"https":%s}}\n' \
        '{{ resolved_route_hosts | to_json }}' \
        '{{ route_port | to_json }}' \
        '{{ "true" if (route_https | default(true) | bool) else "false" }}'
      args:
        executable: /bin/sh

    - name: Converge Caddy route
      block:
        - name: Validate required route inputs
          assert:
            that:
              - app_slug is defined
              - (app_slug | string | length) > 0
              - app_container_name is defined
              - (app_container_name | string | length) > 0
              - resolved_route_hosts | length > 0
              - route_port is defined
              - (route_port | int) > 0
            fail_msg: "app_slug, app_container_name, route_host(s), and route_port are required"

        - name: Verify managed Caddy proxy state exists
          stat:
            path: "{{ caddy_proxy_state_file }}"
          register: caddy_proxy_state_stat

        - name: Reject missing managed Caddy proxy state
          fail:
            msg: "Managed caddy proxy state not found; run /setup proxy --engine=caddy first"
          when: not caddy_proxy_state_stat.stat.exists

        - name: Load managed Caddy proxy state
          slurp:
            path: "{{ caddy_proxy_state_file }}"
          register: caddy_proxy_state_raw

        - name: Decode managed Caddy proxy state
          set_fact:
            caddy_proxy_state: "{{ caddy_proxy_state_raw.content | b64decode | from_json }}"

        - name: Validate managed Caddy proxy state
          assert:
            that:
              - (caddy_proxy_state.engine | default('')) == 'caddy'
            fail_msg: "Managed proxy state is not caddy; refusing to converge deployment route"

        - name: Ensure route directory exists
          file:
            path: "{{ caddy_route_dir }}"
            state: directory
            mode: "0755"

        - name: Write Caddy route config
          copy:
            dest: "{{ caddy_route_config_file }}"
            mode: "0644"
            content: |
              {{ caddy_site_addresses }} {
                reverse_proxy 127.0.0.1:{{ route_port }}
              }

        - name: Validate Caddy configuration
          command: caddy validate --config "{{ caddy_config_file }}" --adapter caddyfile
          changed_when: false

        - name: Reload Caddy with updated route config
          service:
            name: caddy
            state: reloaded

        - name: OPERATION_STEP caddy-route:ready
          shell: |
            printf 'OPERATION_STEP={"name":"caddy-route:ready","status":"completed","metadata":{"hosts":%s}}\n' '{{ resolved_route_hosts | to_json }}'
          args:
            executable: /bin/sh

        - name: OPERATION_STEP caddy-route:complete
          shell: |
            printf 'OPERATION_STEP={"name":"caddy-route:complete","status":"completed","metadata":{"hosts":%s,"route_port":%s,"https":%s}}\n' \
            '{{ resolved_route_hosts | to_json }}' \
            '{{ route_port | to_json }}' \
            '{{ "true" if (route_https | default(true) | bool) else "false" }}'
          args:
            executable: /bin/sh
      rescue:
        - name: OPERATION_STEP caddy-route:failure
          shell: |
            printf 'OPERATION_STEP={"name":"caddy-route:failure","status":"failed","metadata":{"hosts":%s}}\n' '{{ resolved_route_hosts | default([]) | to_json }}'
          args:
            executable: /bin/sh

        - name: Fail Caddy route converge
          fail:
            msg: "Caddy route converge failed"
