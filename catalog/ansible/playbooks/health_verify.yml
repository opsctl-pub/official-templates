---
- name: Verify health endpoint (official)
  hosts: all
  gather_facts: false
  vars:
    timeout_s: 60
    resolved_health_mode: "{{ health_mode | default('http') }}"
  tasks:
    - name: Validate health verification mode
      assert:
        that:
          - resolved_health_mode in ['http', 'tcp_connect']
        fail_msg: "health_mode must be http or tcp_connect"

    - name: Verify health endpoint
      block:
        - name: OPERATION_STEP health:start http
          shell: |
            printf 'OPERATION_STEP={"name":"health:start","status":"running","metadata":{"mode":"http","url":"%s"}}\n' "{{ health_url }}"
          args:
            executable: /bin/sh
          when: resolved_health_mode == 'http'

        - name: Check HTTP health
          uri:
            url: "{{ health_url }}"
            method: GET
            status_code: 200
            return_content: no
            validate_certs: "{{ health_validate_certs | default(true) | bool }}"
            headers: "{{ health_headers | default({}) }}"
          register: _resp
          retries: 10
          delay: 3
          until: _resp.status == 200
          when: resolved_health_mode == 'http'

        - name: OPERATION_STEP health:complete http
          shell: |
            printf 'OPERATION_STEP={"name":"health:complete","status":"completed","metadata":{"mode":"http","url":"%s"}}\n' "{{ health_url }}"
          args:
            executable: /bin/sh
          when: resolved_health_mode == 'http'

        - name: OPERATION_STEP health:start tcp
          shell: |
            printf 'OPERATION_STEP={"name":"health:start","status":"running","metadata":{"mode":"tcp_connect","host":"%s","port":"%s"}}\n' "{{ health_host }}" "{{ health_port }}"
          args:
            executable: /bin/sh
          when: resolved_health_mode == 'tcp_connect'

        - name: Check TCP connectivity
          wait_for:
            host: "{{ health_host }}"
            port: "{{ health_port }}"
            state: started
            timeout: "{{ timeout_s | int }}"
            connect_timeout: 5
          when: resolved_health_mode == 'tcp_connect'

        - name: OPERATION_STEP health:complete tcp
          shell: |
            printf 'OPERATION_STEP={"name":"health:complete","status":"completed","metadata":{"mode":"tcp_connect","host":"%s","port":"%s"}}\n' "{{ health_host }}" "{{ health_port }}"
          args:
            executable: /bin/sh
          when: resolved_health_mode == 'tcp_connect'
      rescue:
        - name: OPERATION_STEP health:failure
          shell: |
            if [ "{{ resolved_health_mode }}" = "tcp_connect" ]; then
              printf 'OPERATION_STEP={"name":"health:failure","status":"failed","metadata":{"mode":"tcp_connect","host":"%s","port":"%s"}}\n' "{{ health_host }}" "{{ health_port }}"
            else
              printf 'OPERATION_STEP={"name":"health:failure","status":"failed","metadata":{"mode":"http","url":"%s"}}\n' "{{ health_url }}"
            fi
          args:
            executable: /bin/sh

        - name: Fail health verification
          fail:
            msg: "Health verification failed"
